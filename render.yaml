services:
  - type: web
    name: sinclin-runtime
    runtime: node
    plan: starter

    buildCommand: |
      cd staging/api
      npm install

    startCommand: |
      cd staging/api
      node server.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MASTER_PIN
        sync: false
      - key: MASTER_SECRET
        sync: false
