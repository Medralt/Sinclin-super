<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SINCLIN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
#topbar{background:#1e293b;border-bottom:1px solid #334155;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
#topbar h1{font-size:16px;font-weight:600;letter-spacing:2px;color:#fff}
#status{font-size:12px;display:flex;align-items:center;gap:6px;color:#94a3b8}
#dot{width:8px;height:8px;border-radius:50%;background:#ef4444;transition:background 0.3s}
#dot.on{background:#22c55e}
#agent-bar{background:#1e293b;border-bottom:1px solid #334155;padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap}
.abtn{padding:4px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;transition:all 0.15s}
.abtn.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
#mode-bar{background:#0f172a;border-bottom:1px solid #1e293b;padding:6px 20px;display:flex;gap:8px}
.mbtn{padding:3px 10px;border-radius:5px;border:1px solid #1e293b;background:transparent;color:#475569;font-size:11px;cursor:pointer}
.mbtn.active{background:#1e293b;color:#94a3b8}
#messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:75%;padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.5}
.msg.user{align-self:flex-end;background:#4f46e5;color:#fff;border-bottom-right-radius:2px}
.msg.ai{align-self:flex-start;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-bottom-left-radius:2px}
.msg.sys{align-self:center;background:transparent;color:#475569;font-size:12px;border:none;padding:4px}
.msg-meta{font-size:11px;opacity:0.6;margin-top:4px}
#inputbar{background:#1e293b;border-top:1px solid #334155;padding:12px 20px;display:flex;gap:8px}
#inputbar input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none}
#inputbar input:focus{border-color:#4f46e5}
#inputbar button{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer}
#inputbar button:disabled{opacity:0.4;cursor:default}
#typing{padding:4px 20px 8px;font-size:12px;color:#475569;min-height:20px}
</style>
</head>
<body>
<div id="topbar">
  <h1>SINCLIN</h1>
  <div id="status"><span id="dot"></span><span id="status-label">verificando...</span></div>
</div>
<div id="agent-bar">
  <button class="abtn active" onclick="setAgent('patient',this)">Patient</button>
  <button class="abtn" onclick="setAgent('doctor',this)">Doctor</button>
  <button class="abtn" onclick="setAgent('collaborator',this)">Collaborator</button>
  <button class="abtn" onclick="setAgent('marketing',this)">Marketing</button>
  <button class="abtn" onclick="setAgent('commercial',this)">Commercial</button>
</div>
<div id="mode-bar">
  <button class="mbtn active" onclick="setMode('chat',this)">Chat</button>
  <button class="mbtn" onclick="setMode('sioc',this)">SIOC / Anamnese</button>
</div>
<div id="messages">
  <div class="msg sys">SINCLIN — runtime cognitivo ativo</div>
</div>
<div id="typing"></div>
<div id="inputbar">
  <input id="inp" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')send()"/>
  <button id="btn" onclick="send()">Enviar</button>
</div>
<script>
const API = "https://api.sinclin.net";
let sid = "ui_" + Date.now();
let agent = "patient";
let mode = "chat";

function setAgent(a, el) {
  agent = a;
  document.querySelectorAll(".abtn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  addMsg("sys", "Agente: " + a);
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll(".mbtn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  if (m === "sioc") {
    sid = "sioc_" + Date.now();
    addMsg("sys", "Modo SIOC — nova sessao de anamnese iniciada");
  } else {
    addMsg("sys", "Modo Chat");
  }
}

function addMsg(type, text, meta) {
  const box = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.textContent = text;
  if (meta) {
    const m = document.createElement("div");
    m.className = "msg-meta";
    m.textContent = meta;
    d.appendChild(m);
  }
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

async function send() {
  const inp = document.getElementById("inp");
  const btn = document.getElementById("btn");
  const text = inp.value.trim();
  if (!text) return;
  addMsg("user", text);
  inp.value = "";
  btn.disabled = true;
  document.getElementById("typing").textContent = "Sinclin processando...";
  try {
    let url, body;
    if (mode === "sioc") {
      url = API + "/sioc";
      body = JSON.stringify({ session_id: sid, input: { raw_text: text } });
    } else {
      url = API + "/chat";
      body = JSON.stringify({ session_id: sid, persona: agent, input: { raw_text: text } });
    }
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body
    });
    const data = await res.json();
    const reply = data.text || data.response || data.message || JSON.stringify(data);
    addMsg("ai", reply, new Date().toLocaleTimeString("pt-BR"));
  } catch(e) {
    addMsg("ai", "Erro de conexao: " + e.message);
  }
  btn.disabled = false;
  document.getElementById("typing").textContent = "";
}

async function checkHealth() {
  const dot = document.getElementById("dot");
  const label = document.getElementById("status-label");
  try {
    const res = await fetch(API + "/health");
    const data = await res.json();
    if (data.ok || data.runtime || data.status === "ok") {
      dot.className = "on";
      label.textContent = "API online";
    } else {
      dot.className = "";
      label.textContent = "runtime degradado";
    }
  } catch(e) {
    dot.className = "";
    label.textContent = "API offline";
  }
}

checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
